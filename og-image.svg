<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAFAF8"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#FFFFFF" stroke="#E8E6E1" stroke-width="1.5"/>
  <rect x="60" y="60" width="1080" height="10" rx="5" fill="#C4420A"/>
  <!-- Logo block -->
  <rect x="110" y="130" width="84" height="84" rx="18" fill="#C4420A"/>
  <text x="152" y="190" font-size="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="white" text-anchor="middle">kr</text>
  <!-- Title -->
  <text x="222" y="178" font-size="44" font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#1A1A1A">Tvangsmulkt-kalkulator</text>
  <text x="222" y="224" font-size="26" font-family="system-ui, -apple-system, sans-serif" font-weight="400" fill="#454545">Beregn hva sen levering til Skatteetaten koster deg</text>
  <!-- Divider -->
  <line x1="110" y1="272" x2="1090" y2="272" stroke="#E8E6E1" stroke-width="1.5"/>
  <!-- Rates table -->
  <text x="110" y="330" font-size="22" font-family="system-ui, -apple-system, sans-serif" fill="#454545">Mva-melding / Skattemelding</text>
  <text x="1090" y="330" font-size="22" font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#1A1A1A" text-anchor="end">672,50 kr/dag</text>
  <line x1="110" y1="348" x2="1090" y2="348" stroke="#F0EDE8" stroke-width="1"/>
  <text x="110" y="386" font-size="22" font-family="system-ui, -apple-system, sans-serif" fill="#454545">A-melding</text>
  <text x="1090" y="386" font-size="22" font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#1A1A1A" text-anchor="end">134,50 kr/dag per ansatt</text>
  <line x1="110" y1="404" x2="1090" y2="404" stroke="#F0EDE8" stroke-width="1"/>
  <text x="110" y="442" font-size="22" font-family="system-ui, -apple-system, sans-serif" fill="#454545">Bokforingspalegg</text>
  <text x="1090" y="442" font-size="22" font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#1A1A1A" text-anchor="end">1 345 kr/dag</text>
  <!-- Bottom row -->
  <rect x="110" y="488" width="180" height="46" rx="10" fill="#FFF3ED" stroke="#FDDCCC" stroke-width="1"/>
  <text x="200" y="517" font-size="22" font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#C4420A" text-anchor="middle">Satser 2026</text>
  <text x="1090" y="517" font-size="20" font-family="system-ui, -apple-system, sans-serif" fill="#454545" text-anchor="end">tvangsmulktkalkulator.no</text>
</svg>
